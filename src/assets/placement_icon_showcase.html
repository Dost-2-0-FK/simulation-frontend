
<h2 class="sr-only">Map placement icon candidates for East vs West strategy game</h2>
<style>
.ic{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding:8px 6px;border-radius:var(--border-radius-md);border:0.5px solid transparent;width:82px;box-sizing:border-box}
.ic:hover{background:var(--color-background-secondary);border-color:var(--color-border-secondary)}
.ic.sel{border-color:#185FA5;background:var(--color-background-info)}
.ic-lbl{font-size:11px;color:var(--color-text-secondary);text-align:center;line-height:1.3}
.ic-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.75rem}
.sec-lbl{font-size:11px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:.08em;text-transform:uppercase;margin:0 0 8px}
.ctrl-btn{padding:3px 11px;font-size:12px;border-radius:99px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;line-height:1.6}
.ctrl-btn.on{background:var(--color-text-primary);color:var(--color-background-primary);border-color:transparent}
.credit{font-size:11px;color:var(--color-text-tertiary);margin-top:.5rem}
@keyframes pr{0%,100%{opacity:.3}50%{opacity:.85}}
.pring{animation:pr 1.6s ease-in-out infinite}
</style>

<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.75rem;align-items:center">
  <span style="font-size:12px;color:var(--color-text-secondary)">Bloc:</span>
  <button class="ctrl-btn on" data-group="bloc" onclick="setBloc('west',this)">West</button>
  <button class="ctrl-btn" data-group="bloc" onclick="setBloc('east',this)">East</button>
  <span style="margin-left:14px;font-size:12px;color:var(--color-text-secondary)">State:</span>
  <button class="ctrl-btn on" data-group="state" onclick="setSt('normal',this)">Normal</button>
  <button class="ctrl-btn" data-group="state" onclick="setSt('priority',this)">Prioritised</button>
  <button class="ctrl-btn" data-group="state" onclick="setSt('disabled',this)">Disabled</button>
</div>

<p class="sec-lbl">Empty placement ◯ — three style options</p>
<div class="ic-row" id="empty-row"></div>

<p class="sec-lbl">Base ⬡ — hexagon marker</p>
<div class="ic-row" id="base-row"></div>

<p class="sec-lbl">Trust ◇ — diamond marker</p>
<div class="ic-row" id="trust-row"></div>

<p class="credit">Icons: <a href="https://game-icons.net" target="_blank">game-icons.net</a> by Delapouite, CC BY 3.0</p>

let bloc='west', state='normal', sel={};

function gc(){return state==='disabled'?clrs.disabled:clrs[bloc];}

function hexPts(cx,cy,r){
  return [0,60,120,180,240,300].map(a=>{
    const rad=(a-90)*Math.PI/180;
    return `${(cx+r*Math.cos(rad)).toFixed(1)},${(cy+r*Math.sin(rad)).toFixed(1)}`;
  }).join(' ');
}

function iconG(key,sz,col){
  if(!paths[key]) return '';
  const sc=(sz*0.58)/512, off=sz*0.21;
  return `<g transform="translate(${off.toFixed(1)},${off.toFixed(1)}) scale(${sc.toFixed(4)})"><path fill="${col}" d="${paths[key]}"/></g>`;
}

function marker(type,key){
  const c=gc(), sz=54, h=sz/2;
  const ring=state==='priority'?`<circle cx="${h}" cy="${h}" r="${h+2}" fill="none" stroke="${c.ring}" stroke-width="3" class="pring"/>` : '';
  const op=state==='disabled'?'opacity=".55"':'';
  let shape='', inner='';

  if(type==='empty'){
    shape=`<circle cx="${h}" cy="${h}" r="${h-3}" fill="none" stroke="${c.bg}" stroke-width="2" stroke-dasharray="5 3"/>`;
    if(key==='crosshair'){
      inner=`<line x1="${h}" y1="8" x2="${h}" y2="${sz-8}" stroke="${c.bg}" stroke-width="1.5"/>
      <line x1="8" y1="${h}" x2="${sz-8}" y2="${h}" stroke="${c.bg}" stroke-width="1.5"/>
      <circle cx="${h}" cy="${h}" r="3.5" fill="${c.bg}"/>`;
    } else if(key==='plus'){
      inner=`<line x1="${h}" y1="16" x2="${h}" y2="${sz-16}" stroke="${c.bg}" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="16" y1="${h}" x2="${sz-16}" y2="${h}" stroke="${c.bg}" stroke-width="2.5" stroke-linecap="round"/>`;
    } else {
      inner=`<circle cx="${h}" cy="${h}" r="4.5" fill="${c.bg}"/>`;
    }
  } else if(type==='base'){
    shape=`<polygon points="${hexPts(h,h,h-2)}" fill="${c.bg}" stroke="${c.ring}" stroke-width="1.5"/>`;
    inner=iconG(key,sz,'#fff');
  } else {
    shape=`<polygon points="${h},3 ${sz-3},${h} ${h},${sz-3} 3,${h}" fill="${c.bg}" stroke="${c.ring}" stroke-width="1.5"/>`;
    inner=iconG(key,sz,'#fff');
  }
  return `<svg viewBox="0 0 ${sz} ${sz}" width="${sz}" height="${sz}" ${op}>${ring}${shape}${inner}</svg>`;
}

function card(type,key,lbl){
  const id=`c-${type}-${key}`;
  const cls='ic'+(sel[type]===key?' sel':'');
  return `<div class="${cls}" id="${id}" onclick="pick('${type}','${key}')">${marker(type,key)}<span class="ic-lbl">${lbl}</span></div>`;
}

function renderAll(){
  document.getElementById('empty-row').innerHTML=
    [['crosshair','Crosshair'],['plus','Plus sign'],['dot','Center dot']].map(([k,l])=>card('empty',k,l)).join('');
  document.getElementById('base-row').innerHTML=
    [['military-fort','Military fort'],['watchtower','Watchtower']].map(([k,l])=>card('base',k,l)).join('');
  document.getElementById('trust-row').innerHTML=
    [['factory','Factory'],['oil-pump','Oil pump'],['oil-rig','Oil rig'],['refinery','Refinery'],['mine-wagon','Mine wagon'],['bank','Bank']].map(([k,l])=>card('trust',k,l)).join('');
}

function tog(btn){
  const g=btn.dataset.group;
  document.querySelectorAll(`.ctrl-btn[data-group="${g}"]`).forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}
function setBloc(b,btn){bloc=b;tog(btn);renderAll();}
function setSt(s,btn){state=s;tog(btn);renderAll();}
function pick(type,key){sel[type]=key;renderAll();}

renderAll();
</script>
